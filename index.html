<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Fruits n' Vegetables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#122019;
    --bg-2:#0d1712;
    --wood:#5c3a22;
    --wood-dark:#40270f;
    --wood-light:#7a4d2c;
    --cream:#fff6e4;
    --cream-dim:#f0e3c6;
    --ink:#241608;
    --orange:#f2a93b;
    --tomato:#e14b3d;
    --lime:#9fd14b;
    --text:#f4efe0;
    --muted:#a79c81;
    --shadow: rgba(0,0,0,.45);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100%;
    background:
      radial-gradient(ellipse at top, rgba(159,209,75,.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Work Sans', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 14px 40px;
  }

  /* ---------- Header ---------- */
  header{
    width:100%;
    max-width:840px;
    text-align:center;
    margin-bottom:14px;
  }
  .signboard{
    display:inline-block;
    background:
      repeating-linear-gradient(180deg, var(--wood) 0 8px, var(--wood-light) 8px 9px);
    border:6px solid var(--wood-dark);
    border-radius:10px;
    padding:10px 30px;
    box-shadow:0 10px 24px var(--shadow), inset 0 0 0 2px rgba(255,255,255,.05);
    transform:rotate(-0.6deg);
  }
  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:clamp(1.6rem, 5vw, 2.5rem);
    margin:0;
    color:var(--cream);
    letter-spacing:.5px;
    text-shadow:2px 2px 0 rgba(0,0,0,.3);
  }
  h1 .accent{color:var(--orange);}
  .tagline{
    font-size:.85rem;
    color:var(--muted);
    margin-top:6px;
    letter-spacing:.3px;
  }

  /* ---------- HUD ---------- */
  .hud{
    width:100%;
    max-width:840px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
    margin-bottom:16px;
  }
  .gauge{
    background:var(--bg-2);
    border:2px solid var(--wood);
    border-radius:10px;
    padding:8px 16px;
    min-width:96px;
    text-align:center;
    box-shadow:0 4px 10px var(--shadow);
  }
  .gauge .label{
    font-size:.62rem;
    text-transform:uppercase;
    letter-spacing:1.2px;
    color:var(--muted);
    display:block;
    margin-bottom:2px;
  }
  .gauge .value{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:1.25rem;
    color:var(--lime);
  }
  .gauge.time .value{color:var(--orange);}
  .gauge.time.low .value{color:var(--tomato); animation:pulse 0.7s infinite;}
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.4;}}

  .controls{
    display:flex;
    gap:8px;
    align-items:center;
  }
  button.tool{
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size:.78rem;
    background:var(--cream);
    color:var(--ink);
    border:none;
    border-radius:8px;
    padding:10px 14px;
    cursor:pointer;
    box-shadow:0 3px 0 #c9b98a, 0 5px 10px var(--shadow);
    transition:transform .08s ease;
  }
  button.tool:active{transform:translateY(3px); box-shadow:0 0 0 #c9b98a;}
  button.tool:disabled{opacity:.4; cursor:not-allowed;}
  button.tool .count{
    display:inline-block;
    background:var(--tomato);
    color:#fff;
    border-radius:50%;
    font-size:.62rem;
    width:16px;height:16px;
    line-height:16px;
    margin-left:5px;
  }

  /* ---------- Board ---------- */
  .crate-wrap{
    position:relative;
    padding:16px;
    background:
      repeating-linear-gradient(90deg, var(--wood) 0 26px, var(--wood-light) 26px 28px);
    border:8px solid var(--wood-dark);
    border-radius:14px;
    box-shadow:0 16px 34px var(--shadow), inset 0 0 20px rgba(0,0,0,.35);
    max-width:96vw;
  }
  #board{
    position:relative;
    display:grid;
    gap:4px;
    touch-action:manipulation;
  }
  .tile{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--cream);
    border-radius:8px;
    box-shadow:0 3px 0 rgba(0,0,0,.18), 0 4px 8px rgba(0,0,0,.25);
    cursor:pointer;
    font-size:clamp(1.1rem, 3.4vw, 1.7rem);
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:transform .12s ease, box-shadow .12s ease;
    animation:pop .22s ease;
  }
  @keyframes pop{from{transform:scale(.4); opacity:0;} to{transform:scale(1); opacity:1;}}
  .tile::after{
    content:"";
    position:absolute;
    top:0; right:0;
    width:0; height:0;
    border-style:solid;
    border-width:0 9px 9px 0;
    border-color:transparent rgba(0,0,0,.13) transparent transparent;
    border-top-right-radius:8px;
  }
  .tile:hover{transform:translateY(-2px);}
  .tile.selected{
    box-shadow:0 0 0 3px var(--lime), 0 4px 10px rgba(0,0,0,.3);
    transform:translateY(-3px) scale(1.05);
  }
  .tile.hint{animation:hintFlash .5s ease 2;}
  @keyframes hintFlash{0%,100%{box-shadow:0 3px 0 rgba(0,0,0,.18);} 50%{box-shadow:0 0 0 3px var(--orange);}}
  .tile.bad{animation:shake .35s ease;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    75%{transform:translateX(5px);}
  }
  .tile.cleared{
    animation:clearOut .28s ease forwards;
    pointer-events:none;
  }
  @keyframes clearOut{
    to{transform:scale(0.15) rotate(12deg); opacity:0;}
  }
  #pathLayer{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:visible;
  }
  #pathLayer path{
    fill:none;
    stroke:var(--lime);
    stroke-width:4;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:8 6;
    opacity:0;
  }
  #pathLayer path.show{
    opacity:1;
    animation:dash .4s linear;
  }
  @keyframes dash{from{stroke-dashoffset:40;} to{stroke-dashoffset:0;}}

  /* ---------- Overlay ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(10,14,10,.72);
    display:flex; align-items:center; justify-content:center;
    z-index:20;
    opacity:0; pointer-events:none;
    transition:opacity .2s ease;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .card{
    background:var(--cream);
    color:var(--ink);
    border-radius:16px;
    padding:30px 34px;
    text-align:center;
    max-width:340px;
    box-shadow:0 20px 40px rgba(0,0,0,.5);
    transform:scale(.9);
    transition:transform .2s ease;
  }
  .overlay.show .card{transform:scale(1);}
  .card h2{
    font-family:'Fredoka', sans-serif;
    margin:0 0 6px;
    font-size:1.6rem;
  }
  .card p{margin:6px 0 18px; color:#4b3d24; font-size:.9rem;}
  .card .big-stat{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:2rem;
    color:var(--tomato);
    margin-bottom:14px;
  }
  .card button{
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    background:var(--lime);
    border:none;
    color:#16240e;
    padding:12px 26px;
    border-radius:9px;
    font-size:.95rem;
    cursor:pointer;
    box-shadow:0 4px 0 #6f9a2b;
  }
  .card button:active{transform:translateY(4px); box-shadow:none;}

  .toast{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--cream);
    padding:10px 18px;
    border-radius:8px;
    font-size:.82rem;
    opacity:0;
    transition:all .25s ease;
    pointer-events:none;
    z-index:30;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  footer{
    margin-top:22px;
    font-size:.72rem;
    color:var(--muted);
    text-align:center;
  }
  footer a{color:var(--orange);}
</style>
</head>
<body>

<header>
  <div class="signboard">
    <h1>Fruits n' <span class="accent">Vegetables</span></h1>
  </div>
  <div class="tagline">Connect matching pairs — routes may bend up to 3 times.</div>
</header>

<div class="hud">
  <div class="gauge"><span class="label">Level</span><span class="value" id="hud-level">1</span></div>
  <div class="gauge time"><span class="label">Time</span><span class="value" id="hud-time">90</span></div>
  <div class="gauge"><span class="label">Score</span><span class="value" id="hud-score">0</span></div>
  <div class="gauge"><span class="label">Best</span><span class="value" id="hud-best">0</span></div>
  <div class="controls">
    <button class="tool" id="btn-hint">Hint<span class="count" id="hint-count">3</span></button>
    <button class="tool" id="btn-shuffle">Shuffle<span class="count" id="shuffle-count">2</span></button>
  </div>
</div>

<div class="crate-wrap">
  <div id="board"></div>
</div>

<footer>Made for Janelijs 🌽 &middot; hosted free on GitHub Pages</footer>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay-win">
  <div class="card">
    <h2>Crate cleared!</h2>
    <p id="win-copy">Every tile connected before time ran out.</p>
    <div class="big-stat" id="win-score">0</div>
    <button id="btn-next">Next Level →</button>
  </div>
</div>

<div class="overlay" id="overlay-lose">
  <div class="card">
    <h2>Time's up</h2>
    <p>The timer ran out before the crate was cleared.</p>
    <div class="big-stat" id="lose-score">0</div>
    <button id="btn-restart">Play Again</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- Config ---------------- */
  const ICONS = [
    "🍎","🍌","🍇","🍉","🍓","🍒","🍑","🍍","🥝","🥭",
    "🍅","🥕","🌽","🥦","🍆","🫑","🧄","🧅","🥑","🍋","🍐","🥔"
  ];
  const MAX_TURNS = 3;
  const BASE_LEVELS = [
    {rows:5, cols:6, types:4, time:90},
    {rows:6, cols:6, types:5, time:90},
    {rows:6, cols:8, types:6, time:95},
    {rows:7, cols:8, types:6, time:95},
    {rows:8, cols:8, types:7, time:100},
    {rows:8, cols:10, types:8, time:105},
  ];

  function getLevelConfig(n){
    if (n-1 < BASE_LEVELS.length) return {...BASE_LEVELS[n-1]};
    const extra = n - BASE_LEVELS.length;
    const last = BASE_LEVELS[BASE_LEVELS.length-1];
    return {
      rows: Math.min(10, last.rows + Math.floor(extra/2)),
      cols: Math.min(12, last.cols + Math.floor(extra/2)),
      types: Math.min(ICONS.length, last.types + Math.floor(extra/3)),
      time: Math.max(50, last.time - extra*3)
    };
  }

  /* ---------------- State ---------------- */
  const state = {
    level: 1,
    rows: 0, cols: 0, types: 0,
    grid: null,          // extended grid (rows+2) x (cols+2), 0 = empty
    tilesLeft: 0,
    score: 0,
    best: Number(localStorage.getItem('fnv_best')||0),
    timeLeft: 0,
    timerId: null,
    selected: null,       // {r,c}
    hints: 3,
    shuffles: 2,
    busy: false
  };

  /* ---------------- DOM refs ---------------- */
  const boardEl = document.getElementById('board');
  const hudLevel = document.getElementById('hud-level');
  const hudTime = document.getElementById('hud-time');
  const hudScore = document.getElementById('hud-score');
  const hudBest = document.getElementById('hud-best');
  const timeGauge = document.querySelector('.gauge.time');
  const btnHint = document.getElementById('btn-hint');
  const btnShuffle = document.getElementById('btn-shuffle');
  const hintCount = document.getElementById('hint-count');
  const shuffleCount = document.getElementById('shuffle-count');
  const overlayWin = document.getElementById('overlay-win');
  const overlayLose = document.getElementById('overlay-lose');
  const winScore = document.getElementById('win-score');
  const winCopy = document.getElementById('win-copy');
  const loseScore = document.getElementById('lose-score');
  const toastEl = document.getElementById('toast');
  let toastTimer = null;

  hudBest.textContent = state.best;

  /* ---------------- Utilities ---------------- */
  function shuffleArray(arr){
    for (let i=arr.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 1800);
  }

  /* ---------------- Level building ---------------- */
  function buildLevel(n){
    const cfg = getLevelConfig(n);
    let {rows, cols, types, time} = cfg;
    if ((rows*cols) % 2 !== 0) cols++;
    const totalCells = rows*cols;
    const totalPairs = totalCells/2;

    const pool = [];
    for (let i=0;i<totalPairs;i++){
      const typeIdx = i % types;
      pool.push(typeIdx, typeIdx);
    }
    shuffleArray(pool);

    const R = rows+2, C = cols+2;
    const grid = Array.from({length:R}, ()=>Array(C).fill(0));
    let idx = 0;
    for (let r=0;r<rows;r++){
      for (let c=0;c<cols;c++){
        grid[r+1][c+1] = pool[idx++] + 1;
      }
    }

    state.rows = rows;
    state.cols = cols;
    state.types = types;
    state.grid = grid;
    state.tilesLeft = totalCells;
    state.timeLeft = time;
    state.selected = null;
    state.hints = 3;
    state.shuffles = 2;

    renderBoard();
    updateHud();
    startTimer();
    ensureSolvable();
  }

  /* ---------------- Rendering ---------------- */
  function renderBoard(){
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;
    boardEl.style.gridTemplateRows = `repeat(${state.rows}, 1fr)`;

    const maxCellPx = Math.floor(Math.min(
      (window.innerWidth*0.92 - 40) / state.cols,
      (window.innerHeight*0.5) / state.rows
    ));
    const cell = Math.max(28, Math.min(58, maxCellPx));
    boardEl.style.width = (cell*state.cols + 4*(state.cols-1)) + 'px';
    boardEl.style.height = (cell*state.rows + 4*(state.rows-1)) + 'px';

    for (let r=0;r<state.rows;r++){
      for (let c=0;c<state.cols;c++){
        const type = state.grid[r+1][c+1];
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.r = r;
        tile.dataset.c = c;
        if (type === 0){
          tile.style.visibility = 'hidden';
        } else {
          tile.textContent = ICONS[type-1];
          tile.addEventListener('click', onTileClick);
        }
        boardEl.appendChild(tile);
      }
    }

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('id','pathLayer');
    svg.setAttribute('width','100%');
    svg.setAttribute('height','100%');
    boardEl.appendChild(svg);
  }

  function tileEl(r,c){
    return boardEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
  }

  function updateHud(){
    hudLevel.textContent = state.level;
    hudTime.textContent = state.timeLeft;
    hudScore.textContent = state.score;
    hudBest.textContent = state.best;
    hintCount.textContent = state.hints;
    shuffleCount.textContent = state.shuffles;
    btnHint.disabled = state.hints <= 0;
    btnShuffle.disabled = state.shuffles <= 0;
    timeGauge.classList.toggle('low', state.timeLeft <= 15);
  }

  /* ---------------- Timer ---------------- */
  function startTimer(){
    clearInterval(state.timerId);
    state.timerId = setInterval(()=>{
      state.timeLeft--;
      updateHud();
      if (state.timeLeft <= 0){
        clearInterval(state.timerId);
        onLose();
      }
    }, 1000);
  }

  /* ---------------- Path finding (BFS, up to MAX_TURNS bends) ---------------- */
  function findPath(a, b){
    const R = state.rows+2, C = state.cols+2;
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    const visited = new Map();
    const queue = [];

    for (let d=0; d<4; d++){
      const nr = a.r+dirs[d][0], nc = a.c+dirs[d][1];
      if (nr<0||nr>=R||nc<0||nc>=C) continue;
      const entry = {r:nr,c:nc,dir:d,turns:0,parent:null,from:a};
      if (nr===b.r && nc===b.c) return reconstruct(entry, a);
      if (state.grid[nr][nc]===0){
        const key = nr+','+nc+','+d;
        visited.set(key,0);
        queue.push(entry);
      }
    }

    let head = 0;
    while(head < queue.length){
      const cur = queue[head++];
      for (let d=0; d<4; d++){
        const nr = cur.r+dirs[d][0], nc = cur.c+dirs[d][1];
        const turns = cur.turns + (d===cur.dir ? 0 : 1);
        if (turns > MAX_TURNS) continue;
        if (nr===b.r && nc===b.c) return reconstruct({r:nr,c:nc,dir:d,turns,parent:cur}, a);
        if (nr<0||nr>=R||nc<0||nc>=C) continue;
        if (state.grid[nr][nc]!==0) continue;
        const key = nr+','+nc+','+d;
        if (visited.has(key) && visited.get(key) <= turns) continue;
        visited.set(key, turns);
        queue.push({r:nr,c:nc,dir:d,turns,parent:cur});
      }
    }
    return null;
  }

  function reconstruct(entry, start){
    const pts = [];
    let cur = entry;
    while(cur){
      pts.push({r:cur.r, c:cur.c});
      cur = cur.parent;
    }
    pts.push(start);
    pts.reverse();
    return pts;
  }

  function canConnect(a,b){
    return findPath(a,b) !== null;
  }

  /* ---------------- Interaction ---------------- */
  function onTileClick(e){
    if (state.busy) return;
    const r = Number(e.currentTarget.dataset.r);
    const c = Number(e.currentTarget.dataset.c);
    if (state.grid[r+1][c+1] === 0) return;

    if (!state.selected){
      state.selected = {r,c};
      tileEl(r,c).classList.add('selected');
      return;
    }
    if (state.selected.r === r && state.selected.c === c){
      tileEl(r,c).classList.remove('selected');
      state.selected = null;
      return;
    }

    const a = state.selected;
    const b = {r,c};
    const typeA = state.grid[a.r+1][a.c+1];
    const typeB = state.grid[b.r+1][b.c+1];

    tileEl(a.r,a.c).classList.remove('selected');

    if (typeA === typeB){
      const path = findPath({r:a.r+1,c:a.c+1}, {r:b.r+1,c:b.c+1});
      if (path){
        state.selected = null;
        matchTiles(a,b,path);
        return;
      }
    }
    // no match
    const elA = tileEl(a.r,a.c), elB = tileEl(b.r,b.c);
    elB.classList.add('bad');
    elA.classList.add('bad');
    setTimeout(()=>{ elA.classList.remove('bad'); elB.classList.remove('bad'); }, 350);
    state.selected = {r,c};
    tileEl(r,c).classList.add('selected');
  }

  function drawPath(path){
    const svg = document.getElementById('pathLayer');
    if (!svg) return;
    const cellW = boardEl.clientWidth / state.cols;
    const cellH = boardEl.clientHeight / state.rows;
    const pt = (p)=>{
      const x = (p.c-1+0.5) * cellW;
      const y = (p.r-1+0.5) * cellH;
      return `${x},${y}`;
    };
    const d = 'M ' + path.map(pt).join(' L ');
    const el = document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d', d);
    svg.appendChild(el);
    requestAnimationFrame(()=>el.classList.add('show'));
    setTimeout(()=>el.remove(), 420);
  }

  function matchTiles(a,b,path){
    state.busy = true;
    drawPath(path);
    const elA = tileEl(a.r,a.c), elB = tileEl(b.r,b.c);
    elA.classList.add('cleared');
    elB.classList.add('cleared');
    state.grid[a.r+1][a.c+1] = 0;
    state.grid[b.r+1][b.c+1] = 0;
    state.tilesLeft -= 2;
    state.score += 10 + Math.max(0, Math.floor(state.timeLeft/10));
    updateHud();

    setTimeout(()=>{
      state.busy = false;
      if (state.tilesLeft <= 0){
        onWin();
      } else {
        ensureSolvable();
      }
    }, 260);
  }

  /* ---------------- Solvability guard ---------------- */
  function collectFilled(){
    const cells = [];
    for (let r=1;r<=state.rows;r++){
      for (let c=1;c<=state.cols;c++){
        if (state.grid[r][c] !== 0) cells.push({r,c,type:state.grid[r][c]});
      }
    }
    return cells;
  }

  function hasAvailableMove(){
    const cells = collectFilled();
    const byType = new Map();
    cells.forEach(cell=>{
      if (!byType.has(cell.type)) byType.set(cell.type, []);
      byType.get(cell.type).push(cell);
    });
    for (const group of byType.values()){
      for (let i=0;i<group.length;i++){
        for (let j=i+1;j<group.length;j++){
          if (canConnect(group[i], group[j])) return true;
        }
      }
    }
    return false;
  }

  function ensureSolvable(){
    if (state.tilesLeft <= 0) return;
    let attempts = 0;
    while (!hasAvailableMove() && attempts < 300){
      reshufflePositions();
      attempts++;
    }
    if (attempts > 0) {
      renderBoard();
      showToast('Reshuffled — fresh layout!');
    }
  }

  function reshufflePositions(){
    const cells = collectFilled();
    const types = cells.map(c=>c.type);
    shuffleArray(types);
    cells.forEach((cell,i)=>{ state.grid[cell.r][cell.c] = types[i]; });
  }

  /* ---------------- Tools ---------------- */
  btnHint.addEventListener('click', ()=>{
    if (state.hints <= 0 || state.busy) return;
    const cells = collectFilled();
    const byType = new Map();
    cells.forEach(cell=>{
      if (!byType.has(cell.type)) byType.set(cell.type, []);
      byType.get(cell.type).push(cell);
    });
    for (const group of byType.values()){
      for (let i=0;i<group.length;i++){
        for (let j=i+1;j<group.length;j++){
          if (canConnect(group[i], group[j])){
            const a = tileEl(group[i].r-1, group[i].c-1);
            const b = tileEl(group[j].r-1, group[j].c-1);
            a.classList.add('hint'); b.classList.add('hint');
            setTimeout(()=>{ a.classList.remove('hint'); b.classList.remove('hint'); }, 1000);
            state.hints--;
            updateHud();
            return;
          }
        }
      }
    }
    showToast('No pairs found — try shuffling.');
  });

  btnShuffle.addEventListener('click', ()=>{
    if (state.shuffles <= 0 || state.busy) return;
    reshufflePositions();
    renderBoard();
    state.shuffles--;
    updateHud();
    ensureSolvable();
    showToast('Board shuffled.');
  });

  /* ---------------- Win / Lose ---------------- */
  function onWin(){
    clearInterval(state.timerId);
    const bonus = state.timeLeft * 5;
    state.score += bonus;
    if (state.score > state.best){
      state.best = state.score;
      localStorage.setItem('fnv_best', state.best);
    }
    winCopy.textContent = `Time bonus: +${bonus} points.`;
    winScore.textContent = state.score;
    updateHud();
    overlayWin.classList.add('show');
  }

  function onLose(){
    if (state.score > state.best){
      state.best = state.score;
      localStorage.setItem('fnv_best', state.best);
    }
    loseScore.textContent = state.score;
    updateHud();
    overlayLose.classList.add('show');
  }

  document.getElementById('btn-next').addEventListener('click', ()=>{
    overlayWin.classList.remove('show');
    state.level++;
    buildLevel(state.level);
  });

  document.getElementById('btn-restart').addEventListener('click', ()=>{
    overlayLose.classList.remove('show');
    state.level = 1;
    state.score = 0;
    buildLevel(state.level);
  });

  window.addEventListener('resize', ()=>{ if(!state.busy) renderBoard(); });

  /* ---------------- Start ---------------- */
  buildLevel(state.level);
})();
</script>
</body>
</html>
