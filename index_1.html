<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Fruits n' Vegetables</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#0f2418;
    --bg-2:#173424;
    --wood:#5c3a22;
    --wood-dark:#3c2510;
    --wood-light:#7c4f2c;
    --cream:#fff9ec;
    --cream-dim:#f3e6c9;
    --ink:#2b1b10;
    --sun:#ffc93c;
    --papaya:#ff6b4a;
    --lime:#b4e33d;
    --grape:#a463f2;
    --text:#f7f3e6;
    --muted:#a9c2ab;
    --shadow: rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100%;
    overflow-x:hidden;
    background:
      radial-gradient(ellipse 90% 60% at 50% -10%, rgba(255,201,60,.14), transparent 60%),
      radial-gradient(ellipse 70% 50% at 90% 100%, rgba(164,99,242,.10), transparent 60%),
      linear-gradient(180deg, var(--bg-1), var(--bg-2) 60%, var(--bg-1));
    color:var(--text);
    font-family:'Nunito', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:22px 14px 44px;
    position:relative;
  }

  /* ---------- Floating background orchard ---------- */
  #bgFruit{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }
  #bgFruit span{
    position:absolute;
    opacity:.10;
    filter:blur(.5px);
    animation:drift linear infinite;
    will-change:transform;
  }
  @keyframes drift{
    0%{ transform:translateY(0) rotate(0deg);}
    50%{ transform:translateY(-40px) rotate(8deg);}
    100%{ transform:translateY(0) rotate(0deg);}
  }

  header, .hud, .crate-wrap, footer, .overlay{ position:relative; z-index:1; }

  /* ---------- Header ---------- */
  header{
    width:100%;
    max-width:860px;
    text-align:center;
    margin-bottom:16px;
  }
  .signboard{
    display:inline-block;
    background:
      repeating-linear-gradient(180deg, var(--wood) 0 8px, var(--wood-light) 8px 9px);
    border:6px solid var(--wood-dark);
    border-radius:12px;
    padding:12px 32px;
    box-shadow:0 14px 30px var(--shadow), inset 0 0 0 2px rgba(255,255,255,.06);
    transform:rotate(-0.8deg);
  }
  h1{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    font-size:clamp(1.7rem, 5.4vw, 2.7rem);
    margin:0;
    color:var(--cream);
    letter-spacing:.5px;
    text-shadow:3px 3px 0 rgba(0,0,0,.35);
  }
  h1 .letter{
    display:inline-block;
    animation:bounceIn .55s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  @keyframes bounceIn{
    0%{ transform:translateY(-26px) scale(.5); opacity:0; }
    100%{ transform:translateY(0) scale(1); opacity:1; }
  }
  h1 .accent{color:var(--sun);}
  .tagline{
    font-size:.86rem;
    color:var(--muted);
    margin-top:8px;
    letter-spacing:.3px;
    font-weight:600;
  }

  /* ---------- HUD ---------- */
  .hud{
    width:100%;
    max-width:860px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
    align-items:center;
    margin-bottom:18px;
  }
  .gauge{
    background:var(--bg-1);
    border:2px solid var(--wood);
    border-radius:12px;
    padding:9px 18px;
    min-width:90px;
    text-align:center;
    box-shadow:0 6px 14px var(--shadow);
  }
  .gauge .label{
    font-size:.62rem;
    text-transform:uppercase;
    letter-spacing:1.3px;
    color:var(--muted);
    display:block;
    margin-bottom:2px;
    font-weight:700;
  }
  .gauge .value{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:1.3rem;
    color:var(--lime);
  }

  /* Radial timer */
  .timer-ring{
    position:relative;
    width:78px; height:78px;
    display:flex; align-items:center; justify-content:center;
  }
  .timer-ring svg{ transform:rotate(-90deg); }
  .timer-ring circle{
    fill:none;
    stroke-width:8;
    stroke-linecap:round;
  }
  .timer-ring .track{ stroke:rgba(255,255,255,.08); }
  .timer-ring .prog{
    stroke:var(--sun);
    transition:stroke-dashoffset 1s linear, stroke .3s ease;
  }
  .timer-ring.low .prog{ stroke:var(--papaya); }
  .timer-ring .num{
    position:absolute;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:1.15rem;
    color:var(--cream);
  }
  .timer-ring.low .num{ animation:pulse .7s infinite; color:var(--papaya); }
  @keyframes pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}

  .combo-badge{
    background:linear-gradient(135deg, var(--papaya), var(--sun));
    border-radius:20px;
    padding:6px 14px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:.9rem;
    color:var(--ink);
    box-shadow:0 4px 10px var(--shadow);
    opacity:0;
    transform:scale(.6);
    transition:all .25s cubic-bezier(.34,1.56,.64,1);
  }
  .combo-badge.show{ opacity:1; transform:scale(1); }

  .controls{
    display:flex;
    gap:8px;
    align-items:center;
  }
  button.tool{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:.8rem;
    background:var(--cream);
    color:var(--ink);
    border:none;
    border-radius:10px;
    padding:11px 15px;
    cursor:pointer;
    box-shadow:0 3px 0 #cbb98a, 0 6px 12px var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease;
  }
  button.tool:hover:not(:disabled){ transform:translateY(-1px); }
  button.tool:active:not(:disabled){transform:translateY(3px); box-shadow:0 0 0 #cbb98a;}
  button.tool:disabled{opacity:.4; cursor:not-allowed;}
  button.tool .count{
    display:inline-block;
    background:var(--papaya);
    color:#fff;
    border-radius:50%;
    font-size:.62rem;
    width:16px;height:16px;
    line-height:16px;
    margin-left:5px;
  }
  button.icon-toggle{
    background:var(--bg-1);
    border:2px solid var(--wood);
    color:var(--cream);
    border-radius:10px;
    width:40px; height:40px;
    cursor:pointer;
    font-size:1.1rem;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---------- Board ---------- */
  .crate-wrap{
    position:relative;
    padding:16px;
    background:
      repeating-linear-gradient(90deg, var(--wood) 0 26px, var(--wood-light) 26px 28px);
    border:8px solid var(--wood-dark);
    border-radius:16px;
    box-shadow:0 20px 44px var(--shadow), inset 0 0 24px rgba(0,0,0,.4);
    max-width:96vw;
  }
  #board{
    position:relative;
    display:grid;
    gap:5px;
    touch-action:manipulation;
  }
  .tile{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(155deg, var(--cream), var(--cream-dim));
    border-radius:10px;
    box-shadow:0 3px 0 rgba(0,0,0,.2), 0 5px 10px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.6);
    cursor:pointer;
    font-size:clamp(1.15rem, 3.5vw, 1.8rem);
    user-select:none;
    -webkit-tap-highlight-color:transparent;
    transition:transform .12s ease, box-shadow .12s ease;
    animation:dropIn .38s cubic-bezier(.34,1.56,.64,1) backwards;
  }
  @keyframes dropIn{
    from{ transform:translateY(-24px) scale(.5); opacity:0; }
    to{ transform:translateY(0) scale(1); opacity:1; }
  }
  .tile::after{
    content:"";
    position:absolute;
    top:0; right:0;
    width:0; height:0;
    border-style:solid;
    border-width:0 10px 10px 0;
    border-color:transparent rgba(0,0,0,.14) transparent transparent;
    border-top-right-radius:10px;
  }
  .tile:hover{transform:translateY(-3px) rotate(-1deg);}
  .tile.selected{
    box-shadow:0 0 0 3px var(--lime), 0 0 16px rgba(180,227,61,.6), 0 5px 10px rgba(0,0,0,.3);
    transform:translateY(-4px) scale(1.08);
  }
  .tile.hint{animation:hintFlash .5s ease 2;}
  @keyframes hintFlash{0%,100%{box-shadow:0 3px 0 rgba(0,0,0,.2);} 50%{box-shadow:0 0 0 3px var(--sun), 0 0 16px rgba(255,201,60,.7);}}
  .tile.bad{animation:shake .35s ease;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px) rotate(-3deg);}
    75%{transform:translateX(6px) rotate(3deg);}
  }
  .tile.cleared{
    animation:clearOut .3s ease forwards;
    pointer-events:none;
  }
  @keyframes clearOut{
    to{transform:scale(0.1) rotate(20deg); opacity:0;}
  }
  #pathLayer, #burstLayer{
    position:absolute;
    inset:0;
    pointer-events:none;
    overflow:visible;
  }
  #pathLayer path{
    fill:none;
    stroke:var(--lime);
    stroke-width:4.5;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:8 6;
    opacity:0;
  }
  #pathLayer path.show{
    opacity:1;
    animation:dash .4s linear;
  }
  @keyframes dash{from{stroke-dashoffset:40;} to{stroke-dashoffset:0;}}

  .burst-particle{
    position:absolute;
    font-size:1rem;
    pointer-events:none;
    animation:burst .6s ease-out forwards;
  }
  @keyframes burst{
    0%{ transform:translate(0,0) scale(1); opacity:1; }
    100%{ transform:translate(var(--bx), var(--by)) scale(0.2); opacity:0; }
  }

  .popup-score{
    position:absolute;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    color:var(--sun);
    font-size:.95rem;
    pointer-events:none;
    animation:floatUp .8s ease-out forwards;
    text-shadow:1px 1px 0 rgba(0,0,0,.4);
  }
  @keyframes floatUp{
    0%{ transform:translateY(0); opacity:1; }
    100%{ transform:translateY(-34px); opacity:0; }
  }

  /* ---------- Overlay ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(8,14,9,.78);
    display:flex; align-items:center; justify-content:center;
    z-index:20;
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .card{
    position:relative;
    background:linear-gradient(160deg, var(--cream), var(--cream-dim));
    color:var(--ink);
    border-radius:20px;
    padding:34px 36px;
    text-align:center;
    max-width:360px;
    box-shadow:0 26px 50px rgba(0,0,0,.55);
    transform:scale(.85);
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);
    overflow:hidden;
  }
  .overlay.show .card{transform:scale(1);}
  .card h2{
    font-family:'Baloo 2', sans-serif;
    font-weight:800;
    margin:0 0 6px;
    font-size:1.7rem;
  }
  .card p{margin:6px 0 18px; color:#5a4a30; font-size:.9rem; font-weight:600;}
  .card .big-stat{
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:2.2rem;
    color:var(--papaya);
    margin-bottom:16px;
  }
  .card button{
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    background:linear-gradient(135deg, var(--lime), #8fc72a);
    border:none;
    color:#16240e;
    padding:13px 28px;
    border-radius:11px;
    font-size:1rem;
    cursor:pointer;
    box-shadow:0 5px 0 #6f9a2b;
  }
  .card button:active{transform:translateY(5px); box-shadow:none;}

  .confetti-piece{
    position:absolute;
    top:-20px;
    width:8px; height:14px;
    opacity:.9;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    to{ transform:translateY(420px) rotate(600deg); opacity:0; }
  }

  .toast{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--cream);
    padding:11px 20px;
    border-radius:10px;
    font-size:.84rem;
    font-weight:700;
    opacity:0;
    transition:all .25s ease;
    pointer-events:none;
    z-index:30;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  footer{
    margin-top:24px;
    font-size:.72rem;
    color:var(--muted);
    text-align:center;
  }
  footer a{color:var(--sun); text-decoration:none;}
</style>
</head>
<body>

<div id="bgFruit"></div>

<header>
  <div class="signboard">
    <h1 id="titleText"></h1>
  </div>
  <div class="tagline">Connect matching pairs — paths may bend at most twice.</div>
</header>

<div class="hud">
  <div class="gauge"><span class="label">Level</span><span class="value" id="hud-level">1</span></div>
  <div class="timer-ring" id="timerRing">
    <svg width="78" height="78">
      <circle class="track" cx="39" cy="39" r="32"></circle>
      <circle class="prog" cx="39" cy="39" r="32" id="timerCircle"></circle>
    </svg>
    <span class="num" id="hud-time">90</span>
  </div>
  <div class="gauge"><span class="label">Score</span><span class="value" id="hud-score">0</span></div>
  <div class="gauge"><span class="label">Best</span><span class="value" id="hud-best">0</span></div>
  <div class="combo-badge" id="comboBadge">Combo x2!</div>
  <div class="controls">
    <button class="tool" id="btn-hint">Hint<span class="count" id="hint-count">3</span></button>
    <button class="tool" id="btn-shuffle">Shuffle<span class="count" id="shuffle-count">2</span></button>
    <button class="icon-toggle" id="btn-sound" title="Toggle sound">🔊</button>
  </div>
</div>

<div class="crate-wrap">
  <div id="board"></div>
</div>

<footer>Made for Janelijs 🌽 &middot; hosted free on GitHub Pages</footer>

<div class="toast" id="toast"></div>

<div class="overlay" id="overlay-win">
  <div class="card" id="winCard">
    <h2>Crate cleared! 🎉</h2>
    <p id="win-copy">Every tile connected before time ran out.</p>
    <div class="big-stat" id="win-score">0</div>
    <button id="btn-next">Next Level →</button>
  </div>
</div>

<div class="overlay" id="overlay-lose">
  <div class="card">
    <h2>Time's up ⏳</h2>
    <p>The timer ran out before the crate was cleared.</p>
    <div class="big-stat" id="lose-score">0</div>
    <button id="btn-restart">Play Again</button>
  </div>
</div>

<script>
(function(){
  "use strict";

  /* ---------------- Config ---------------- */
  const ICONS = [
    "🍎","🍌","🍇","🍉","🍓","🍒","🍑","🍍","🥝","🥭",
    "🍅","🥕","🌽","🥦","🍆","🫑","🧄","🧅","🥑","🍋","🍐","🥔"
  ];
  // Strict classic rule: a connecting path may bend at most twice
  // (i.e. at most three straight segments — forward/up/right is fine,
  // forward/up/left/down has three bends and is NOT allowed).
  const MAX_TURNS = 2;

  const BASE_LEVELS = [
    {rows:5, cols:6, types:4, time:90},
    {rows:6, cols:6, types:5, time:90},
    {rows:6, cols:8, types:6, time:95},
    {rows:7, cols:8, types:6, time:95},
    {rows:8, cols:8, types:7, time:100},
    {rows:8, cols:10, types:8, time:105},
  ];

  function getLevelConfig(n){
    if (n-1 < BASE_LEVELS.length) return {...BASE_LEVELS[n-1]};
    const extra = n - BASE_LEVELS.length;
    const last = BASE_LEVELS[BASE_LEVELS.length-1];
    return {
      rows: Math.min(10, last.rows + Math.floor(extra/2)),
      cols: Math.min(12, last.cols + Math.floor(extra/2)),
      types: Math.min(ICONS.length, last.types + Math.floor(extra/3)),
      time: Math.max(50, last.time - extra*3)
    };
  }

  /* ---------------- State ---------------- */
  const state = {
    level: 1,
    rows: 0, cols: 0, types: 0,
    grid: null,
    tilesLeft: 0,
    score: 0,
    best: Number(localStorage.getItem('fnv_best')||0),
    timeLeft: 0,
    levelTime: 90,
    timerId: null,
    selected: null,
    hints: 3,
    shuffles: 2,
    busy: false,
    combo: 0,
    lastMatchAt: 0,
    soundOn: true
  };

  /* ---------------- DOM refs ---------------- */
  const boardEl = document.getElementById('board');
  const hudLevel = document.getElementById('hud-level');
  const hudTime = document.getElementById('hud-time');
  const hudScore = document.getElementById('hud-score');
  const hudBest = document.getElementById('hud-best');
  const timerRing = document.getElementById('timerRing');
  const timerCircle = document.getElementById('timerCircle');
  const comboBadge = document.getElementById('comboBadge');
  const btnHint = document.getElementById('btn-hint');
  const btnShuffle = document.getElementById('btn-shuffle');
  const btnSound = document.getElementById('btn-sound');
  const hintCount = document.getElementById('hint-count');
  const shuffleCount = document.getElementById('shuffle-count');
  const overlayWin = document.getElementById('overlay-win');
  const overlayLose = document.getElementById('overlay-lose');
  const winCard = document.getElementById('winCard');
  const winScore = document.getElementById('win-score');
  const winCopy = document.getElementById('win-copy');
  const loseScore = document.getElementById('lose-score');
  const toastEl = document.getElementById('toast');
  let toastTimer = null, comboTimer = null;

  const RING_R = 32;
  const RING_C = 2 * Math.PI * RING_R;
  timerCircle.style.strokeDasharray = RING_C;

  hudBest.textContent = state.best;

  /* ---------------- Title bounce-in ---------------- */
  (function initTitle(){
    const h1 = document.getElementById('titleText');
    const text = "Fruits n' Vegetables";
    const accentFrom = text.indexOf('Vegetables');
    let html = '';
    let delay = 0;
    for (let i=0;i<text.length;i++){
      const ch = text[i];
      const cls = i >= accentFrom ? 'letter accent' : 'letter';
      const display = ch === ' ' ? '&nbsp;' : ch;
      html += `<span class="${cls}" style="animation-delay:${delay}ms">${display}</span>`;
      delay += 28;
    }
    h1.innerHTML = html;
  })();

  /* ---------------- Floating background orchard ---------------- */
  (function initBgFruit(){
    const layer = document.getElementById('bgFruit');
    const set = ["🍎","🍌","🍇","🍉","🍓","🥕","🌽","🥑","🍋","🍐"];
    const count = window.innerWidth < 600 ? 8 : 14;
    for (let i=0;i<count;i++){
      const s = document.createElement('span');
      s.textContent = set[Math.floor(Math.random()*set.length)];
      s.style.left = Math.random()*100 + 'vw';
      s.style.top = Math.random()*100 + 'vh';
      s.style.fontSize = (2 + Math.random()*3.5) + 'rem';
      s.style.animationDuration = (6 + Math.random()*8) + 's';
      s.style.animationDelay = (Math.random()*5) + 's';
      layer.appendChild(s);
    }
  })();

  /* ---------------- Sound (tiny WebAudio synth, no assets) ---------------- */
  let actx = null;
  function ctx(){ if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)(); return actx; }
  function beep(freq, dur, type, gain){
    if (!state.soundOn) return;
    try{
      const c = ctx();
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      g.gain.value = gain||0.06;
      osc.connect(g); g.connect(c.destination);
      osc.start();
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
      osc.stop(c.currentTime + dur);
    }catch(e){}
  }
  function sfxMatch(combo){ beep(520 + combo*60, 0.14, 'triangle', 0.07); beep(780 + combo*60, 0.12, 'sine', 0.05); }
  function sfxBad(){ beep(140, 0.18, 'sawtooth', 0.05); }
  function sfxWin(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.25,'triangle',0.06), i*110)); }
  function sfxLose(){ [400,300,220].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'sawtooth',0.05), i*140)); }

  btnSound.addEventListener('click', ()=>{
    state.soundOn = !state.soundOn;
    btnSound.textContent = state.soundOn ? '🔊' : '🔇';
    if (state.soundOn) beep(600,0.08,'sine',0.05);
  });

  /* ---------------- Utilities ---------------- */
  function shuffleArray(arr){
    for (let i=arr.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=>toastEl.classList.remove('show'), 1800);
  }

  /* ---------------- Level building ---------------- */
  function buildLevel(n){
    const cfg = getLevelConfig(n);
    let {rows, cols, types, time} = cfg;
    if ((rows*cols) % 2 !== 0) cols++;
    const totalCells = rows*cols;
    const totalPairs = totalCells/2;

    const pool = [];
    for (let i=0;i<totalPairs;i++){
      const typeIdx = i % types;
      pool.push(typeIdx, typeIdx);
    }
    shuffleArray(pool);

    const R = rows+2, C = cols+2;
    const grid = Array.from({length:R}, ()=>Array(C).fill(0));
    let idx = 0;
    for (let r=0;r<rows;r++){
      for (let c=0;c<cols;c++){
        grid[r+1][c+1] = pool[idx++] + 1;
      }
    }

    state.rows = rows;
    state.cols = cols;
    state.types = types;
    state.grid = grid;
    state.tilesLeft = totalCells;
    state.timeLeft = time;
    state.levelTime = time;
    state.selected = null;
    state.hints = 3;
    state.shuffles = 2;
    state.combo = 0;

    renderBoard();
    updateHud();
    startTimer();
    ensureSolvable();
  }

  /* ---------------- Rendering ---------------- */
  function renderBoard(){
    boardEl.innerHTML = '';
    boardEl.style.gridTemplateColumns = `repeat(${state.cols}, 1fr)`;
    boardEl.style.gridTemplateRows = `repeat(${state.rows}, 1fr)`;

    const maxCellPx = Math.floor(Math.min(
      (window.innerWidth*0.92 - 40) / state.cols,
      (window.innerHeight*0.5) / state.rows
    ));
    const cell = Math.max(28, Math.min(58, maxCellPx));
    boardEl.style.width = (cell*state.cols + 5*(state.cols-1)) + 'px';
    boardEl.style.height = (cell*state.rows + 5*(state.rows-1)) + 'px';

    let i = 0;
    for (let r=0;r<state.rows;r++){
      for (let c=0;c<state.cols;c++){
        const type = state.grid[r+1][c+1];
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.style.animationDelay = (i*10) + 'ms';
        tile.dataset.r = r;
        tile.dataset.c = c;
        if (type === 0){
          tile.style.visibility = 'hidden';
        } else {
          tile.textContent = ICONS[type-1];
          tile.addEventListener('click', onTileClick);
        }
        boardEl.appendChild(tile);
        i++;
      }
    }

    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('id','pathLayer');
    svg.setAttribute('width','100%');
    svg.setAttribute('height','100%');
    boardEl.appendChild(svg);

    const burst = document.createElement('div');
    burst.id = 'burstLayer';
    boardEl.appendChild(burst);
  }

  function tileEl(r,c){
    return boardEl.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
  }

  function updateHud(){
    hudLevel.textContent = state.level;
    hudTime.textContent = state.timeLeft;
    hudScore.textContent = state.score;
    hudBest.textContent = state.best;
    hintCount.textContent = state.hints;
    shuffleCount.textContent = state.shuffles;
    btnHint.disabled = state.hints <= 0;
    btnShuffle.disabled = state.shuffles <= 0;

    const frac = Math.max(0, state.timeLeft / state.levelTime);
    timerCircle.style.strokeDashoffset = RING_C * (1 - frac);
    timerRing.classList.toggle('low', state.timeLeft <= 15);
  }

  /* ---------------- Timer ---------------- */
  function startTimer(){
    clearInterval(state.timerId);
    state.timerId = setInterval(()=>{
      state.timeLeft--;
      updateHud();
      if (state.timeLeft <= 0){
        clearInterval(state.timerId);
        onLose();
      }
    }, 1000);
  }

  /* ---------------- Path finding (BFS, up to MAX_TURNS bends) ---------------- */
  function findPath(a, b){
    const R = state.rows+2, C = state.cols+2;
    const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    const visited = new Map();
    const queue = [];

    for (let d=0; d<4; d++){
      const nr = a.r+dirs[d][0], nc = a.c+dirs[d][1];
      if (nr<0||nr>=R||nc<0||nc>=C) continue;
      const entry = {r:nr,c:nc,dir:d,turns:0,parent:null,from:a};
      if (nr===b.r && nc===b.c) return reconstruct(entry, a);
      if (state.grid[nr][nc]===0){
        const key = nr+','+nc+','+d;
        visited.set(key,0);
        queue.push(entry);
      }
    }

    let head = 0;
    while(head < queue.length){
      const cur = queue[head++];
      for (let d=0; d<4; d++){
        const nr = cur.r+dirs[d][0], nc = cur.c+dirs[d][1];
        const turns = cur.turns + (d===cur.dir ? 0 : 1);
        if (turns > MAX_TURNS) continue;
        if (nr===b.r && nc===b.c) return reconstruct({r:nr,c:nc,dir:d,turns,parent:cur}, a);
        if (nr<0||nr>=R||nc<0||nc>=C) continue;
        if (state.grid[nr][nc]!==0) continue;
        const key = nr+','+nc+','+d;
        if (visited.has(key) && visited.get(key) <= turns) continue;
        visited.set(key, turns);
        queue.push({r:nr,c:nc,dir:d,turns,parent:cur});
      }
    }
    return null;
  }

  function reconstruct(entry, start){
    const pts = [];
    let cur = entry;
    while(cur){
      pts.push({r:cur.r, c:cur.c});
      cur = cur.parent;
    }
    pts.push(start);
    pts.reverse();
    return pts;
  }

  function canConnect(a,b){
    return findPath(a,b) !== null;
  }

  /* ---------------- Interaction ---------------- */
  function onTileClick(e){
    if (state.busy) return;
    const r = Number(e.currentTarget.dataset.r);
    const c = Number(e.currentTarget.dataset.c);
    if (state.grid[r+1][c+1] === 0) return;

    if (!state.selected){
      state.selected = {r,c};
      tileEl(r,c).classList.add('selected');
      return;
    }
    if (state.selected.r === r && state.selected.c === c){
      tileEl(r,c).classList.remove('selected');
      state.selected = null;
      return;
    }

    const a = state.selected;
    const b = {r,c};
    const typeA = state.grid[a.r+1][a.c+1];
    const typeB = state.grid[b.r+1][b.c+1];

    tileEl(a.r,a.c).classList.remove('selected');

    if (typeA === typeB){
      const path = findPath({r:a.r+1,c:a.c+1}, {r:b.r+1,c:b.c+1});
      if (path){
        state.selected = null;
        matchTiles(a,b,path);
        return;
      }
    }
    sfxBad();
    const elA = tileEl(a.r,a.c), elB = tileEl(b.r,b.c);
    elB.classList.add('bad');
    elA.classList.add('bad');
    setTimeout(()=>{ elA.classList.remove('bad'); elB.classList.remove('bad'); }, 350);
    state.selected = {r,c};
    tileEl(r,c).classList.add('selected');
  }

  function drawPath(path){
    const svg = document.getElementById('pathLayer');
    if (!svg) return;
    const cellW = boardEl.clientWidth / state.cols;
    const cellH = boardEl.clientHeight / state.rows;
    const pt = (p)=>{
      const x = (p.c-1+0.5) * cellW;
      const y = (p.r-1+0.5) * cellH;
      return `${x},${y}`;
    };
    const d = 'M ' + path.map(pt).join(' L ');
    const el = document.createElementNS('http://www.w3.org/2000/svg','path');
    el.setAttribute('d', d);
    svg.appendChild(el);
    requestAnimationFrame(()=>el.classList.add('show'));
    setTimeout(()=>el.remove(), 420);
  }

  function burstAt(r,c){
    const layer = document.getElementById('burstLayer');
    if (!layer) return;
    const el = tileEl(r,c);
    const box = el.getBoundingClientRect();
    const boardBox = boardEl.getBoundingClientRect();
    const cx = box.left - boardBox.left + box.width/2;
    const cy = box.top - boardBox.top + box.height/2;
    const bits = ["✨","🍃","⭐","💥"];
    for (let i=0;i<5;i++){
      const p = document.createElement('span');
      p.className = 'burst-particle';
      p.textContent = bits[Math.floor(Math.random()*bits.length)];
      const angle = Math.random()*Math.PI*2;
      const dist = 22 + Math.random()*22;
      p.style.setProperty('--bx', Math.cos(angle)*dist + 'px');
      p.style.setProperty('--by', Math.sin(angle)*dist + 'px');
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      layer.appendChild(p);
      setTimeout(()=>p.remove(), 650);
    }
  }

  function popupScore(r,c,text){
    const layer = document.getElementById('burstLayer');
    if (!layer) return;
    const el = tileEl(r,c);
    const box = el.getBoundingClientRect();
    const boardBox = boardEl.getBoundingClientRect();
    const p = document.createElement('span');
    p.className = 'popup-score';
    p.textContent = text;
    p.style.left = (box.left - boardBox.left + box.width/2 - 12) + 'px';
    p.style.top = (box.top - boardBox.top) + 'px';
    layer.appendChild(p);
    setTimeout(()=>p.remove(), 800);
  }

  function matchTiles(a,b,path){
    state.busy = true;
    drawPath(path);
    burstAt(a.r,a.c); burstAt(b.r,b.c);

    const now = Date.now();
    if (now - state.lastMatchAt < 4000) state.combo++;
    else state.combo = 1;
    state.lastMatchAt = now;

    const base = 10 + Math.max(0, Math.floor(state.timeLeft/10));
    const gained = base * Math.max(1, state.combo);
    state.score += gained;
    popupScore(b.r,b.c, '+'+gained);

    if (state.combo >= 2){
      comboBadge.textContent = `Combo x${state.combo}!`;
      comboBadge.classList.add('show');
      clearTimeout(comboTimer);
      comboTimer = setTimeout(()=>comboBadge.classList.remove('show'), 1100);
    }

    sfxMatch(state.combo);

    const elA = tileEl(a.r,a.c), elB = tileEl(b.r,b.c);
    elA.classList.add('cleared');
    elB.classList.add('cleared');
    state.grid[a.r+1][a.c+1] = 0;
    state.grid[b.r+1][b.c+1] = 0;
    state.tilesLeft -= 2;
    updateHud();

    setTimeout(()=>{
      state.busy = false;
      if (state.tilesLeft <= 0){
        onWin();
      } else {
        ensureSolvable();
      }
    }, 260);
  }

  /* ---------------- Solvability guard ---------------- */
  function collectFilled(){
    const cells = [];
    for (let r=1;r<=state.rows;r++){
      for (let c=1;c<=state.cols;c++){
        if (state.grid[r][c] !== 0) cells.push({r,c,type:state.grid[r][c]});
      }
    }
    return cells;
  }

  function hasAvailableMove(){
    const cells = collectFilled();
    const byType = new Map();
    cells.forEach(cell=>{
      if (!byType.has(cell.type)) byType.set(cell.type, []);
      byType.get(cell.type).push(cell);
    });
    for (const group of byType.values()){
      for (let i=0;i<group.length;i++){
        for (let j=i+1;j<group.length;j++){
          if (canConnect(group[i], group[j])) return true;
        }
      }
    }
    return false;
  }

  function ensureSolvable(){
    if (state.tilesLeft <= 0) return;
    let attempts = 0;
    while (!hasAvailableMove() && attempts < 300){
      reshufflePositions();
      attempts++;
    }
    if (attempts > 0) {
      renderBoard();
      showToast('Reshuffled — fresh layout!');
    }
  }

  function reshufflePositions(){
    const cells = collectFilled();
    const types = cells.map(c=>c.type);
    shuffleArray(types);
    cells.forEach((cell,i)=>{ state.grid[cell.r][cell.c] = types[i]; });
  }

  /* ---------------- Tools ---------------- */
  btnHint.addEventListener('click', ()=>{
    if (state.hints <= 0 || state.busy) return;
    const cells = collectFilled();
    const byType = new Map();
    cells.forEach(cell=>{
      if (!byType.has(cell.type)) byType.set(cell.type, []);
      byType.get(cell.type).push(cell);
    });
    for (const group of byType.values()){
      for (let i=0;i<group.length;i++){
        for (let j=i+1;j<group.length;j++){
          if (canConnect(group[i], group[j])){
            const a = tileEl(group[i].r-1, group[i].c-1);
            const b = tileEl(group[j].r-1, group[j].c-1);
            a.classList.add('hint'); b.classList.add('hint');
            setTimeout(()=>{ a.classList.remove('hint'); b.classList.remove('hint'); }, 1000);
            state.hints--;
            updateHud();
            return;
          }
        }
      }
    }
    showToast('No pairs found — try shuffling.');
  });

  btnShuffle.addEventListener('click', ()=>{
    if (state.shuffles <= 0 || state.busy) return;
    reshufflePositions();
    renderBoard();
    state.shuffles--;
    updateHud();
    ensureSolvable();
    showToast('Board shuffled.');
  });

  /* ---------------- Win / Lose ---------------- */
  function spawnConfetti(){
    const colors = ['#ffc93c','#ff6b4a','#b4e33d','#a463f2','#fff9ec'];
    for (let i=0;i<40;i++){
      const p = document.createElement('span');
      p.className = 'confetti-piece';
      p.style.left = Math.random()*100 + '%';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration = (1.2 + Math.random()*1.1) + 's';
      p.style.animationDelay = (Math.random()*0.4) + 's';
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      winCard.appendChild(p);
      setTimeout(()=>p.remove(), 2600);
    }
  }

  function onWin(){
    clearInterval(state.timerId);
    const bonus = state.timeLeft * 5;
    state.score += bonus;
    if (state.score > state.best){
      state.best = state.score;
      localStorage.setItem('fnv_best', state.best);
    }
    winCopy.textContent = `Time bonus: +${bonus} points.`;
    winScore.textContent = state.score;
    updateHud();
    overlayWin.classList.add('show');
    sfxWin();
    spawnConfetti();
  }

  function onLose(){
    if (state.score > state.best){
      state.best = state.score;
      localStorage.setItem('fnv_best', state.best);
    }
    loseScore.textContent = state.score;
    updateHud();
    overlayLose.classList.add('show');
    sfxLose();
  }

  document.getElementById('btn-next').addEventListener('click', ()=>{
    overlayWin.classList.remove('show');
    state.level++;
    buildLevel(state.level);
  });

  document.getElementById('btn-restart').addEventListener('click', ()=>{
    overlayLose.classList.remove('show');
    state.level = 1;
    state.score = 0;
    buildLevel(state.level);
  });

  window.addEventListener('resize', ()=>{ if(!state.busy) renderBoard(); });

  /* ---------------- Start ---------------- */
  buildLevel(state.level);
})();
</script>
</body>
